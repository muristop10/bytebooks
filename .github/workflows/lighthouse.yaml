name: Lighthouse Check

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build and start the project
        run: |
          npm run build
          # Força o Vite a aceitar conexões externas (--host) na porta 3000
          npm run preview -- --host 0.0.0.0 --port 3000 > server.log 2>&1 &

      - name: Wait for the application to start
        run: |
          echo "Aguardando o servidor iniciar em http://127.0.0.1:3000..."
          # Usamos o IP fixo 127.0.0.1 para evitar problemas de DNS interno do Linux
          npx wait-on http://127.0.0.1:3000 --timeout 45000

      - name: Output server logs on failure
        if: failure()
        run: |
          echo "=== CONTEÚDO DO SERVER.LOG ==="
          cat server.log || echo "Arquivo server.log não encontrado."

      - name: Run Lighthouse CI
        run: npm run lighthouse-ci
        env:
          LHCI_CHROME_FLAGS: "--no-sandbox --headless --disable-gpu"
