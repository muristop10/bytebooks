name: Lighthouse Check

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Atualizado para v4 (suporte nativo ao Node 20+)
      - name: Checkout repository
        uses: actions/checkout@v4

      # Atualizado para v4 e alterado para Node 22 (LTS atual)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      # Inicia o servidor em segundo plano e garante que ele não morra quando o passo terminar
      - name: Build and start the project
        run: |
          npm run build
          nohup npm start > server.log 2>&1 &

      # Aguarda o servidor responder na porta local (substitua 3000 pela sua porta se for diferente)
      - name: Wait for the application to start
        run: |
          echo "Aguardando o servidor iniciar..."
          npx wait-on http://localhost:3000 --timeout 30000

      - name: Run Lighthouse CI
        run: npm run lighthouse-ci
